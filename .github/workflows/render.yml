name: Render and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

# Build budget: HTML render for each course plus Quartz build.
# Stub courses (201, the_crypto_course) render quickly — only one placeholder
# chapter. The calculation course dominates once executable Python is added;
# revisit the timeout then.
jobs:
  # -----------------------------------------------------------------------
  # Render each course book independently (matrix strategy).
  # Each course has its own Python env (pyproject.toml) and _quarto.yml.
  # -----------------------------------------------------------------------
  render-books:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        course:
          - the_calculation_course
          - 201
          - the_crypto_course

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: courses/${{ matrix.course }}/.python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        working-directory: courses/${{ matrix.course }}
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            uv sync
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      - name: Install Typst (PDF engine; tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: typst-community/setup-typst@v3

      - name: Render HTML (book)
        working-directory: courses/${{ matrix.course }}
        run: uv run quarto render --to html

      - name: Verify HTML render produced an index page
        working-directory: courses/${{ matrix.course }}
        run: |
          if [ ! -f _book/index.html ]; then
            echo "::error::_book/index.html missing after render — refusing to deploy."
            ls -la _book/ || echo "_book/ does not exist"
            exit 1
          fi
          echo "OK: _book/index.html exists ($(wc -c < _book/index.html) bytes)"

      # PDF/EPUB only on tagged releases (Typst callout bug; see _quarto.yml comment).
      - name: Render PDF
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: courses/${{ matrix.course }}
        run: uv run quarto render --to pdf
        continue-on-error: true

      - name: Render EPUB
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: courses/${{ matrix.course }}
        run: uv run quarto render --to epub
        continue-on-error: true

      - name: Upload PDF and EPUB on tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            courses/${{ matrix.course }}/_book/*.pdf
            courses/${{ matrix.course }}/_book/*.epub

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-${{ matrix.course }}
          path: courses/${{ matrix.course }}/_book/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Build the unified notes site with Quartz.
  # Quartz reads from quartz/content/ which contains per-course symlinks.
  # -----------------------------------------------------------------------
  build-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          # Quartz v4 requires Node >=22; using the current LTS.
          node-version: "22"

      - name: Install Quartz (clones jackyzha0/quartz#v4 alongside our overrides)
        working-directory: ./quartz
        run: bash setup.sh

      - name: Install Quartz Node dependencies
        working-directory: ./quartz
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build notes site with Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Verify Quartz build produced an index page
        run: |
          if [ ! -f quartz/public/index.html ]; then
            echo "::error::quartz/public/index.html missing after build."
            ls -la quartz/public/ || echo "quartz/public/ does not exist"
            exit 1
          fi
          echo "OK: quartz/public/index.html exists ($(wc -c < quartz/public/index.html) bytes)"

      - name: Upload notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-site
          path: quartz/public/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Stitch all course books + notes + landing page into _site/ and deploy.
  # -----------------------------------------------------------------------
  stitch-and-deploy:
    if: github.ref == 'refs/heads/main'
    needs: [render-books, build-notes]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Download all book artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: book-*
          path: _artifacts/books/

      - name: Download notes artifact
        uses: actions/download-artifact@v4
        with:
          name: notes-site
          path: _artifacts/notes/

      - name: Stitch outputs into _site/
        run: |
          rm -rf _site
          mkdir -p _site

          # Course catalog landing page at the root
          cp site-root/index.html _site/index.html

          # Each course book at /courses/<name>/
          for course in the_calculation_course 201 the_crypto_course; do
            mkdir -p "_site/courses/$course"
            if [ -d "_artifacts/books/book-$course" ]; then
              cp -r "_artifacts/books/book-$course/." "_site/courses/$course/"
              echo "Stitched: courses/$course"
            else
              echo "::warning::No book artifact for $course — skipping."
            fi
          done

          # Notes site at /notes/
          mkdir -p _site/notes
          cp -r _artifacts/notes/. _site/notes/
          echo "Stitched: notes/"

          echo "Final _site/ layout:"
          find _site -maxdepth 3 -type f | sort | head -40

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
