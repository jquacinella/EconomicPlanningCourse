name: Render and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

# Build budget: HTML render plus Quartz build should complete well under 10
# minutes for the v1 skeleton. The migrated markdown content has no executable
# code yet; once the author adds executable Python in `.qmd` files, a full
# re-execution will dominate runtime — revisit this budget then.
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: |
          if [ -f uv.lock ]; then
            uv sync --frozen
          else
            uv sync
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      - name: Install Typst (PDF engine; tag releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: typst-community/setup-typst@v3

      - name: Render HTML (book)
        run: uv run quarto render --to html

      - name: Verify HTML render produced an index page
        run: |
          if [ ! -f _book/index.html ]; then
            echo "::error::_book/index.html missing after render — refusing to deploy."
            ls -la _book/ || echo "_book/ does not exist"
            exit 1
          fi
          echo "OK: _book/index.html exists ($(wc -c < _book/index.html) bytes)"

      # PDF/EPUB are only attempted on tagged releases. The current Quarto
      # Typst format has a known bug ("unknown variable: callout") that
      # makes per-push PDF rendering noisy without producing usable output.
      # When producing print artifacts, run the strip-author-notes script
      # first; see assets/scripts/strip-author-notes.py and the `print`
      # profile in _quarto.yml.
      - name: Render PDF
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run quarto render --to pdf
        continue-on-error: true

      - name: Render EPUB
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run quarto render --to epub
        continue-on-error: true

      - name: Upload PDF and EPUB on tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            _book/*.pdf
            _book/*.epub

      # ---------- Notes track (Quartz) ----------

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          # Quartz v4 requires Node >=22; using the current LTS.
          node-version: "22"

      - name: Install Quartz (clones jackyzha0/quartz#v4 alongside our overrides)
        working-directory: ./quartz
        run: bash setup.sh

      - name: Install Quartz Node dependencies
        working-directory: ./quartz
        run: |
          # setup.sh just brought in upstream's package.json and
          # package-lock.json. `npm ci` installs the locked dependency tree
          # and wires up the local `quartz` bin used in the next step.
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build notes site with Quartz
        working-directory: ./quartz
        # `npx quartz build` resolves to ./node_modules/.bin/quartz, which
        # `npm ci` linked from upstream Quartz's package.json `bin` entry.
        run: npx quartz build

      - name: Verify Quartz build produced an index page
        run: |
          if [ ! -f quartz/public/index.html ]; then
            echo "::error::quartz/public/index.html missing after build."
            ls -la quartz/public/ || echo "quartz/public/ does not exist"
            exit 1
          fi
          echo "OK: quartz/public/index.html exists ($(wc -c < quartz/public/index.html) bytes)"

      # ---------- Stitch outputs ----------

      - name: Stitch book and notes into _site/
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r _book/. _site/
          mkdir -p _site/notes
          cp -r quartz/public/. _site/notes/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
