name: Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            courses/**/*.qmd
            courses/**/*.md
            shared/**/*.md
            site-root/**/*.md
            README.md
            CONTRIBUTING.md
            !courses/**/_book/**
            !courses/**/_freeze/**
            !courses/**/.quarto/**
        continue-on-error: true

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --exclude '^https?://localhost'
            --exclude '^https?://[^/]*calculation-course\.app'
            './courses/**/*.qmd'
            './courses/**/*.md'
            './shared/**/*.md'
          fail: false
