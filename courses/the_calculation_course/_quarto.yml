project:
  type: book
  output-dir: _book
  preview:
    port: 4444
    browser: false

website:
  site-url: "https://jquacinella.github.io/EconomicPlanningCourse/courses/the_calculation_course"

book:
  title: "The Calculation Course"
  subtitle: "A Computational-Economics Curriculum from Multivariable Calculus to Climate-Constrained Planning"
  author: "MetaCoding Solutions"
  date: "today"
  favicon: assets/images/favicon.svg
  search: true
  repo-url: "https://github.com/jquacinella/EconomicPlanningCourse.git"
  repo-actions: [edit, source, issue]
  # PDF/EPUB build only on tagged releases for now — the Quarto Typst
  # format currently emits an undefined `#callout(...)` and breaks per-push
  # PDF renders. Restore `downloads: [pdf, epub]` once that's resolved.
  # downloads: [pdf, epub]
  sharing: [twitter]
  page-navigation: true
  # cover-image intentionally omitted here — rendered explicitly as a banner
  # in index.qmd. Set only in epub: format for EPUB cover page.

  chapters:
    - index.qmd
    - master-resources.qmd
    - part: weeks/part-i.qmd
      chapters:
        - weeks/week-01-multivariable.qmd
        - weeks/week-02-constrained.qmd
        - weeks/week-03-linear-algebra.qmd
        - weeks/week-04-eigenvalues.qmd
        - weeks/week-05-economic-opt.qmd
        - weeks/week-06-lp-duality.qmd
        - weeks/week-07-input-output.qmd
        - weeks/week-08-planning.qmd
        - weeks/week-09-diff-eq.qmd
        - weeks/week-10-growth-stability.qmd
    - post-course.qmd
    - part: controversies/part-ii.qmd
      chapters:
        - controversies/controversy-01-cobb-douglas.qmd
        - controversies/controversy-02-calculation.qmd
        - controversies/controversy-03-transformation.qmd
        - controversies/controversy-04-sraffa.qmd
        - controversies/controversy-05-okishio.qmd
        - controversies/seminar-chinese-critique.qmd
        - controversies/controversy-06-realization.qmd
        - controversies/controversy-07-money.qmd
        - controversies/controversy-08-climate.qmd
    - 201/placeholder.qmd
    - where-this-lands.qmd

  appendices:
    - appendices/appendix-a-prereq.qmd
    - appendices/appendix-b-extra-depth.qmd
    - appendices/appendix-c-absorption.qmd
    - appendices/appendix-d-calculation-in-kind.qmd

# Format, theme, and execute settings.
# Paths are relative to this course directory.
# Run `quarto render` from inside courses/the_calculation_course/.
# Print-profile overrides live in _quarto-print.yml (activated via QUARTO_PROFILE=print).
# NOTE: 'inherits' only merges project-level metadata, not format: settings.
# Format settings must live here directly.

format:
  html:
    theme:
      # Dark listed first → dark is the default; light available via toggle.
      dark: [superhero, ../../shared/assets/css/custom-dark.scss]
      light: [cosmo, ../../shared/assets/css/custom.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    grid:
      sidebar-width: 300px
      body-width: 1200px
      margin-width: 250px
      gutter-width: 1.5rem
    reference-location: margin
    citation-location: margin
    code-tools: true
    code-fold: show
    fig-cap-location: margin
    include-in-header:
      - ../../shared/assets/jsxgraph-include.html
      - ../../shared/assets/font-picker.html
      - ../../shared/assets/notes-links.html
    comments:
      hypothesis: true

  pdf:
    documentclass: scrbook
    papersize: a4
    pdf-engine: typst

  epub:
    toc: true
    toc-depth: 2
    cover-image: assets/images/cover.png

execute:
  freeze: auto
  echo: true
  warning: false
