project:
  type: book
  output-dir: _book

book:
  title: "The Crypto Calculation Course"
  subtitle: "Cryptocurrency, Blockchain, and the Ecosocialist Planning System"
  author: "MetaCoding Solutions"
  date: "today"
  search: true
  repo-url: "https://github.com/jquacinella/EconomicPlanningCourse.git"
  repo-actions: [edit, source, issue]
  page-navigation: true

  chapters:
    - index.qmd

# Format, theme, and execute settings.
# NOTE: 'inherits' only merges project-level metadata, not format: settings.
# Format settings must live here directly.

format:
  html:
    theme:
      dark: [superhero, ../../shared/assets/css/custom-dark.scss]
      light: [cosmo, ../../shared/assets/css/custom.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    grid:
      sidebar-width: 250px
      body-width: 1200px
      margin-width: 250px
      gutter-width: 1.5rem
    reference-location: margin
    citation-location: margin
    code-tools: true
    code-fold: show
    fig-cap-location: margin
    include-in-header:
      - ../../shared/assets/jsxgraph-include.html
    comments:
      hypothesis: true

  pdf:
    documentclass: scrbook
    papersize: a4
    pdf-engine: typst

  epub:
    toc: true
    toc-depth: 2
    cover-image: ../../shared/assets/images/cover.png

execute:
  freeze: auto
  echo: true
  warning: false
