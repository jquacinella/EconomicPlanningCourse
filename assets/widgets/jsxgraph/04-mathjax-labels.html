<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JSXGraph reference: MathJax labels</title>
<link rel="stylesheet" type="text/css"
      href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
<script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"
        type="text/javascript" charset="UTF-8"></script>
<script>
  window.MathJax = {
    tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
    svg: { fontCache: "global" }
  };
</script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 2em; max-width: 720px; }
  #board { width: 600px; height: 400px; }
</style>
</head>
<body>
<h1>MathJax labels in JSXGraph</h1>
<p>Use <code>useMathJax: true</code> on labels and text elements to render
   typeset math, e.g. $f(x) = e^{-x^2}$ as the curve label. This is the
   pattern any chapter that needs proper math typography in a widget should follow.</p>
<div id="board" class="jxgbox"></div>
<script>
  const board = JXG.JSXGraph.initBoard("board", {
    boundingbox: [-3.5, 1.3, 3.5, -0.3],
    axis: true,
    showCopyright: false,
    showNavigation: false
  });

  board.create("functiongraph",
    [x => Math.exp(-x * x), -3, 3],
    { strokeColor: "steelblue", strokeWidth: 2 });

  board.create("text",
    [1.0, 0.9, "$f(x) = e^{-x^2}$"],
    { useMathJax: true, fontSize: 18 });
</script>
</body>
</html>
