<!-- Loaded into the <head> of every HTML page via _quarto.yml's
     format.html.include-in-header. Provides the JSXGraph runtime
     for any chapter that embeds a widget.

     This is the project's interim setup until the
     `jsxgraph/jsxgraph-quarto` extension is installed (run
     `quarto add jsxgraph/jsxgraph-quarto` at the project root —
     see PRD Addendum 1, §1.5). Once the extension is present,
     this include can stay (harmless) or be removed in favor of
     the extension's bundled assets. -->
<link rel="stylesheet" type="text/css"
      href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
<script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"
        type="text/javascript" charset="UTF-8"></script>
